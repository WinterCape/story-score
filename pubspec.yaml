name: story_score
description: "StoryScore — The most beautiful score companion for storytelling card games."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Routing
  go_router: ^17.0.0

  # Database
  drift: ^2.23.1
  drift_flutter: ^0.2.4

  # Settings
  shared_preferences: ^2.5.3

  # IAP
  purchases_flutter: ^9.14.0

  # Charts
  fl_chart: ^0.70.2

  # Audio
  audioplayers: ^6.1.0

  # Animation
  flutter_animate: ^4.5.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  collection: ^1.19.1
  package_info_plus: ^9.0.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  riverpod_generator: ^3.0.3
  build_runner: ^2.4.15
  drift_dev: ^2.23.1
  freezed: ^3.2.3
  json_serializable: ^6.9.5
  custom_lint:
  riverpod_lint: ^3.0.3

  # Testing
  mocktail: ^1.0.4

  # App icon & splash
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icon/
    - assets/sounds/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf
